<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Edse Mission Log • Tahsis 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="manifest" href="data:application/manifest+json,{
      &quot;name&quot;: &quot;Edse Mission Log&quot;,
      &quot;short_name&quot;: &quot;EdseLog&quot;,
      &quot;start_url&quot;: &quot;.&quot;,
      &quot;display&quot;: &quot;standalone&quot;,
      &quot;background_color&quot;: &quot;#1C1D1F&quot;,
      &quot;theme_color&quot;: &quot;#BA0C2F&quot;,
      &quot;icons&quot;: [{
        &quot;src&quot;: &quot;https://via.placeholder.com/192&quot;,
        &quot;sizes&quot;: &quot;192x192&quot;,
        &quot;type&quot;: &quot;image/png&quot;
      }]
    }">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');

        :root {
            --chalk-white:  #F5F5F5;
            --chalk-scarlet:#BA0C2F;
            --chalk-gray:   #A2AAAD;
            --board-bg:     #1C1D1F;
            --board-card:   #252628;
            --board-input:  #2E3032;
            --board-border: rgba(162,170,173,0.18);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--board-bg);
            color: var(--chalk-white);
            min-height: 100vh;
            /* Subtle ruled-chalk-line texture */
            background-image: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 31px,
                rgba(162,170,173,0.035) 31px,
                rgba(162,170,173,0.035) 32px
            );
        }

        /* ── Typography ─────────────────────────────────── */
        .chalk-title   { font-family: 'Caveat', cursive; letter-spacing: 0.04em; }
        .chalk-heading { font-family: 'Caveat', cursive; letter-spacing: 0.02em; }

        /* ── Header ─────────────────────────────────────── */
        .chalk-header {
            background-color: var(--chalk-scarlet);
            border-radius: 1rem;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(245,245,245,0.12);
        }
        .chalk-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.09) 0%, transparent 65%);
            pointer-events: none;
        }

        /* ── Header photo ───────────────────────────────── */
        .header-photo {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(245,245,245,0.55);
            flex-shrink: 0;
            transform: rotate(-6deg);
            box-shadow: 0 4px 14px rgba(0,0,0,0.45);
            transition: transform 0.3s;
        }
        .header-photo:hover { transform: rotate(0deg) scale(1.08); }

        /* ── Header right panel ─────────────────────────── */
        .header-right {
            text-align: right;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.35rem;
        }

        /* ── OSU logo ───────────────────────────────────── */
        .osu-logo {
            width: 36px;
            height: 36px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        /* ── Mission badge ──────────────────────────────── */
        .mission-badge {
            background: rgba(245,245,245,0.15);
            border: 1px solid rgba(245,245,245,0.22);
            border-radius: 0.5rem;
            padding: 0.2rem 0.7rem;
            font-size: 0.78rem;
        }

        /* ── Cards ──────────────────────────────────────── */
        .chalk-card {
            background-color: var(--board-card);
            border: 1px solid var(--board-border);
            border-radius: 1.25rem;
            padding: 1.5rem;
        }

        /* ── Inputs & Selects ───────────────────────────── */
        .chalk-input {
            width: 100%;
            background-color: var(--board-input);
            border: 1px solid var(--board-border);
            border-radius: 0.625rem;
            padding: 0.7rem 1rem;
            color: var(--chalk-white);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.15s;
        }
        .chalk-input:focus { outline: none; border-color: var(--chalk-scarlet); }
        .chalk-input option { background: var(--board-input); }

        /* ── Labels ─────────────────────────────────────── */
        .chalk-label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--chalk-gray);
            margin-bottom: 0.3rem;
        }

        /* ── Buttons ─────────────────────────────────────── */
        .chalk-btn-primary {
            background-color: var(--chalk-scarlet);
            color: var(--chalk-white);
            border: none;
            border-radius: 0.75rem;
            padding: 0.9rem 1rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.15s;
            flex: 1;
        }
        .chalk-btn-primary:hover { opacity: 0.87; }

        .chalk-btn-outline {
            background-color: transparent;
            color: var(--chalk-white);
            border: 1.5px solid rgba(245,245,245,0.45);
            border-radius: 0.75rem;
            padding: 0.9rem 1rem;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: border-color 0.15s;
            flex: 1;
        }
        .chalk-btn-outline:hover { border-color: var(--chalk-white); }

        .chalk-btn-ghost {
            background-color: var(--board-input);
            color: var(--chalk-white);
            border: 1px solid var(--board-border);
            border-radius: 0.625rem;
            padding: 0.55rem 1.1rem;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background-color 0.15s;
        }
        .chalk-btn-ghost:hover { background-color: #363839; }

        .chalk-btn-wide {
            background-color: var(--board-input);
            color: var(--chalk-gray);
            border: 1px dashed var(--board-border);
            border-radius: 0.75rem;
            padding: 0.8rem;
            font-size: 0.875rem;
            cursor: pointer;
            width: 100%;
            transition: color 0.15s, background-color 0.15s;
        }
        .chalk-btn-wide:hover { background-color: #363839; color: var(--chalk-white); }

        .chalk-btn-danger {
            background: transparent;
            color: var(--chalk-gray);
            border: none;
            padding: 0.55rem 1rem;
            font-size: 0.85rem;
            cursor: pointer;
            transition: color 0.15s;
        }
        .chalk-btn-danger:hover { color: var(--chalk-scarlet); }

        /* ── Tab bar ────────────────────────────────────── */
        .tab-bar {
            display: flex;
            border-bottom: 1px solid var(--board-border);
            margin-bottom: 1.5rem;
            overflow-x: auto;
        }
        .tab-btn {
            flex: 1;
            padding: 0.8rem 0.5rem;
            text-align: center;
            font-family: 'Caveat', cursive;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            color: var(--chalk-gray);
            border: none;
            background: transparent;
            cursor: pointer;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }
        .tab-btn:hover { color: var(--chalk-white); }
        .tab-btn.active { color: var(--chalk-scarlet); border-bottom-color: var(--chalk-scarlet); }

        /* ── Crew cards ─────────────────────────────────── */
        .crew-card {
            background-color: var(--board-input);
            border: 1px solid var(--board-border);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.65rem;
        }
        .crew-avatar {
            width: 2rem;
            height: 2rem;
            background-color: var(--chalk-scarlet);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Caveat', cursive;
            font-size: 1rem;
            font-weight: 700;
            flex-shrink: 0;
        }
        .crew-name-input {
            background: transparent;
            border: none;
            outline: none;
            flex: 1;
            font-weight: 500;
            color: var(--chalk-white);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
        }
        .crew-remove {
            background: none;
            border: none;
            color: var(--chalk-gray);
            font-size: 1.2rem;
            line-height: 1;
            cursor: pointer;
            padding: 0;
            transition: color 0.15s;
        }
        .crew-remove:hover { color: var(--chalk-scarlet); }

        /* ── Log entries ────────────────────────────────── */
        .log-entry {
            background-color: var(--board-input);
            border: 1px solid var(--board-border);
            border-radius: 0.875rem;
            padding: 1.1rem 1.25rem;
        }
        .log-weight { color: var(--chalk-scarlet); font-weight: 600; }

        /* ── Leaderboard ────────────────────────────────── */
        .lb-entry {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--board-input);
            border: 1px solid var(--board-border);
            border-radius: 0.75rem;
            padding: 0.9rem 1.25rem;
        }
        .lb-rank {
            font-family: 'Caveat', cursive;
            font-size: 2rem;
            color: var(--chalk-scarlet);
            line-height: 1;
        }

        /* ── Story entries ──────────────────────────────── */
        .story-entry {
            background-color: var(--board-input);
            border: 1px solid var(--board-border);
            border-left: 3px solid var(--chalk-scarlet);
            border-radius: 0.875rem;
            padding: 1.1rem 1.25rem;
        }

        /* ── Bottom bar ─────────────────────────────────── */
        .bottom-bar {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--board-card);
            border: 1px solid var(--board-border);
            border-radius: 1rem;
            padding: 0.6rem 1.25rem;
            display: flex;
            gap: 0.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.45);
            z-index: 50;
        }

        /* ── Misc ───────────────────────────────────────── */
        .eqn-watermark {
            font-family: 'Caveat', cursive;
            font-size: 0.8rem;
            color: rgba(245,245,245,0.3);
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--board-bg); }
        ::-webkit-scrollbar-thumb { background: var(--board-border); border-radius: 2px; }
    </style>
</head>
<body>
    <div class="max-w-2xl mx-auto p-4 pb-28">

        <!-- Header -->
        <header class="chalk-header p-6 mb-6 shadow-xl">
            <div class="flex items-center justify-between gap-4">
                <!-- Edse photo — tilted & fun, won't steal focus -->
                <img src="edse.png" alt="Dr. Edse"
                     style="width:70px;height:70px;border-radius:50%;object-fit:cover;
                            border:3px solid rgba(245,245,245,0.55);flex-shrink:0;
                            transform:rotate(-6deg);box-shadow:0 4px 14px rgba(0,0,0,0.45);
                            transition:transform 0.3s;"
                     onmouseover="this.style.transform='rotate(0deg) scale(1.08)'"
                     onmouseout="this.style.transform='rotate(-6deg)'">
                <div style="flex:1;">
                    <h1 class="chalk-title text-4xl font-bold">🐟 Beaver Telemetry</h1>
                    <p style="color:rgba(245,245,245,0.82);font-size:0.875rem;margin-top:0.2rem;">
                        Tahsis 2026 • Westview Marina • OSU Aero '89
                    </p>
                </div>
                <div style="text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:0.35rem;">
                    <!-- Ohio State Block-O logo -->
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"
                         style="width:36px;height:36px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));"
                         aria-label="Ohio State">
                        <circle cx="50" cy="50" r="48" fill="#BA0C2F"/>
                        <circle cx="50" cy="50" r="30" fill="none" stroke="#FFFFFF" stroke-width="13"/>
                        <circle cx="50" cy="50" r="14" fill="#BA0C2F"/>
                    </svg>
                    <div style="background:rgba(245,245,245,0.15);border:1px solid rgba(245,245,245,0.22);border-radius:0.5rem;padding:0.2rem 0.7rem;font-size:0.78rem;">
                        Nootka / Esperanza Mission
                    </div>
                    <div class="eqn-watermark">ΔS ≥ 0 &nbsp;•&nbsp; dU = δQ − δW</div>
                </div>
            </div>
        </header>

        <!-- Tabs -->
        <div class="tab-bar">
            <button onclick="switchTab(0)" class="tab-btn active" id="tab-0">Log Catch</button>
            <button onclick="switchTab(1)" class="tab-btn" id="tab-1">Logs</button>
            <button onclick="switchTab(2)" class="tab-btn" id="tab-2">Dashboard</button>
            <button onclick="switchTab(3)" class="tab-btn" id="tab-3">Stories</button>
        </div>

        <!-- Tab 0: Log Catch -->
        <div id="tab-content-0" class="tab-content">

            <!-- Crew Setup -->
            <div class="chalk-card mb-5">
                <h2 class="chalk-heading text-2xl font-semibold mb-4" style="display:flex;align-items:center;gap:0.5rem;">
                    <span>👥</span> Crew Manifest (OSU Aero)
                </h2>
                <div id="crew-list" class="grid grid-cols-2 gap-3"></div>
                <button onclick="addCrewMember()" class="chalk-btn-wide mt-4">+ Add Crewmate</button>
            </div>

            <!-- Catch Form -->
            <div class="chalk-card">
                <h2 class="chalk-heading text-2xl font-semibold mb-5" style="display:flex;align-items:center;gap:0.5rem;">
                    <span>🎣</span> Log a Catch
                </h2>
                <form id="catch-form" style="display:flex;flex-direction:column;gap:1.1rem;">
                    <div>
                        <label class="chalk-label">Angler</label>
                        <select id="angler" class="chalk-input"></select>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.9rem;">
                        <div>
                            <label class="chalk-label">Location</label>
                            <select id="location" class="chalk-input">
                                <option value="Westview Marina / Tahsis Inlet">Westview Marina / Tahsis Inlet</option>
                                <option value="Esperanza Inlet - Rosa Harbour">Esperanza Inlet - Rosa Harbour</option>
                                <option value="Esperanza Inlet - Grassi Island">Esperanza Inlet - Grassi Island</option>
                                <option value="Esperanza Inlet - Ferrer Point">Esperanza Inlet - Ferrer Point</option>
                                <option value="Nootka Sound - Yuquot Point">Nootka Sound - Yuquot Point</option>
                                <option value="Catala Island - Glory Hole">Catala Island - Glory Hole</option>
                                <option value="Custom">Custom Location...</option>
                            </select>
                        </div>
                        <div>
                            <label class="chalk-label">Species</label>
                            <select id="species" class="chalk-input">
                                <option value="Chinook (King)">Chinook (King)</option>
                                <option value="Coho (Silver)">Coho (Silver)</option>
                                <option value="Sockeye">Sockeye</option>
                                <option value="Pink">Pink</option>
                                <option value="Chum">Chum</option>
                            </select>
                        </div>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.9rem;">
                        <div>
                            <label class="chalk-label">Est. Weight (lbs)</label>
                            <input type="number" id="weight" step="0.1" class="chalk-input" placeholder="18.5">
                        </div>
                        <div>
                            <label class="chalk-label">Length (in)</label>
                            <input type="number" id="length" class="chalk-input" placeholder="38">
                        </div>
                    </div>
                    <div>
                        <label class="chalk-label">Gear / Notes</label>
                        <input type="text" id="notes" class="chalk-input" placeholder="Trolling with downrigger...">
                    </div>
                    <div>
                        <label class="chalk-label">Story / Black Box</label>
                        <textarea id="story" rows="3" class="chalk-input" style="resize:vertical;" placeholder="What happened? Any Prof. Edse moments?"></textarea>
                    </div>
                    <div style="display:flex;gap:0.75rem;">
                        <button type="button" onclick="logCatch()" class="chalk-btn-primary">Log This Catch 🐟</button>
                        <button type="button" onclick="edseAnalysis()" class="chalk-btn-outline">Edse Analysis</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Tab 1: Logs -->
        <div id="tab-content-1" class="tab-content" style="display:none;">
            <div class="chalk-card">
                <h2 class="chalk-heading text-2xl font-semibold mb-4">Mission Logs</h2>
                <div id="logs-list" style="display:flex;flex-direction:column;gap:0.9rem;max-height:500px;overflow:auto;"></div>
            </div>
        </div>

        <!-- Tab 2: Dashboard -->
        <div id="tab-content-2" class="tab-content" style="display:none;">
            <div class="chalk-card">
                <h2 class="chalk-heading text-2xl font-semibold mb-4">Crew Dashboard</h2>
                <canvas id="stats-chart" style="margin-bottom:1.5rem;"></canvas>
                <div id="leaderboard" style="display:flex;flex-direction:column;gap:0.75rem;"></div>
            </div>
        </div>

        <!-- Tab 3: Stories -->
        <div id="tab-content-3" class="tab-content" style="display:none;">
            <div class="chalk-card">
                <h2 class="chalk-heading text-2xl font-semibold mb-4" style="display:flex;align-items:center;gap:0.5rem;">
                    <span>📖</span> Story Vault (incl. Edse memories)
                </h2>
                <div style="display:flex;flex-direction:column;gap:1rem;">
                    <button onclick="addStory()" class="chalk-btn-wide">+ New Story / Edse Memory</button>
                    <div id="stories-list" style="display:flex;flex-direction:column;gap:1rem;"></div>
                </div>
            </div>
        </div>

        <!-- Bottom Bar -->
        <div class="bottom-bar">
            <button onclick="exportData()" class="chalk-btn-ghost">Export JSON</button>
            <button onclick="importData()" class="chalk-btn-ghost">Import</button>
            <button onclick="clearAllData()" class="chalk-btn-danger">Reset</button>
        </div>
    </div>

    <script>
        let crew = ["Tim", "Buddy 1", "Buddy 2", "Buddy 3"];
        let logs = [];
        let stories = [];
        let chartInstance = null;
        const MAX_CREW_SIZE = 8;

        const edseComments = [
            "Per Professor Edse: This catch generated enough entropy to require a full blackboard wipe-down. Formulas confirm—thermodynamics in action from his von Braun days!",
            "Edse would be proud. He wiped the board clean and derived the exact drag coefficient from memory again. Classic.",
            "Applying Edse thermodynamics: The salmon's fight transferred more energy than a German-accented lecture on equilibrium.",
            "This one filled the imaginary blackboard. Prof. Rudolph Edse approves from the thermo lab!",
            "Heat transfer off the charts! Edse is somewhere smiling while erasing the board and scribbling new formulas."
        ];

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"'`]/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;',
                '`': '&#96;'
            }[char]));
        }

        function saveData() {
            localStorage.setItem('beaverCrew', JSON.stringify(crew));
            localStorage.setItem('beaverLogs', JSON.stringify(logs));
            localStorage.setItem('beaverStories', JSON.stringify(stories));
        }

        function loadData() {
            const savedCrew = localStorage.getItem('beaverCrew');
            if (savedCrew) crew = JSON.parse(savedCrew);
            const savedLogs = localStorage.getItem('beaverLogs');
            if (savedLogs) logs = JSON.parse(savedLogs);
            const savedStories = localStorage.getItem('beaverStories');
            if (savedStories) stories = JSON.parse(savedStories);
        }

        function renderCrew() {
            const container = document.getElementById('crew-list');
            container.innerHTML = '';
            crew.forEach((name, i) => {
                const trimmedName = String(name ?? '').trim();
                const safeName = escapeHtml(trimmedName);
                const avatarInitial = escapeHtml(trimmedName.charAt(0) || '?');
                const div = document.createElement('div');
                div.className = 'crew-card';
                div.innerHTML = `
                    <div class="crew-avatar">${avatarInitial}</div>
                    <input value="${safeName}" onchange="updateCrew(${i}, this.value)" class="crew-name-input" placeholder="Name">
                    ${crew.length > 1 ? `<button onclick="removeCrew(${i})" class="crew-remove">×</button>` : ''}
                `;
                container.appendChild(div);
            });
            updateAnglerSelect();
        }

        function updateCrew(i, val) {
            crew[i] = val.trim() || `Crew ${i+1}`;
            renderCrew();
            saveData();
        }

        function addCrewMember() {
            if (crew.length < MAX_CREW_SIZE) {
                crew.push(`Crew ${crew.length + 1}`);
                renderCrew();
                saveData();
            }
        }

        function removeCrew(i) {
            if (crew.length > 1) {
                crew.splice(i, 1);
                renderCrew();
                saveData();
            }
        }

        function updateAnglerSelect() {
            const select = document.getElementById('angler');
            select.innerHTML = '';
            crew.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                select.appendChild(opt);
            });
        }

        function logCatch() {
            const catchData = {
                id: Date.now(),
                timestamp: new Date().toLocaleString(),
                angler: document.getElementById('angler').value,
                location: document.getElementById('location').value,
                species: document.getElementById('species').value,
                weight: parseFloat(document.getElementById('weight').value) || 0,
                length: parseFloat(document.getElementById('length').value) || 0,
                notes: document.getElementById('notes').value,
                story: document.getElementById('story').value
            };
            logs.unshift(catchData);
            saveData();
            renderLogs();
            switchTab(1);
            document.getElementById('catch-form').reset();
            alert('✅ Catch logged! Great work on the water.');
        }

        function edseAnalysis() {
            const random = edseComments[Math.floor(Math.random() * edseComments.length)];
            alert("🧪 Professor Rudolph Edse Analysis:\n\n" + random);
        }

        function renderLogs() {
            const container = document.getElementById('logs-list');
            container.innerHTML = logs.length === 0
                ? '<p style="color:var(--chalk-gray);text-align:center;padding:3rem 0;">No catches logged yet.<br>Get out there on Esperanza!</p>'
                : logs.map(log => `
                    <div class="log-entry">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                            <div>
                                <span style="font-weight:600;">${escapeHtml(log.angler)}</span>
                                <span style="color:var(--chalk-gray);font-size:0.78rem;margin-left:0.4rem;">${escapeHtml(log.timestamp)}</span>
                            </div>
                            <div class="log-weight">${Number(log.weight || 0).toFixed(1)} lbs</div>
                        </div>
                        <div style="margin-top:0.3rem;font-size:0.95rem;">${escapeHtml(log.species)} <span style="color:var(--chalk-gray);">•</span> ${escapeHtml(log.location)}</div>
                        ${log.story ? `<div style="margin-top:0.65rem;font-size:0.85rem;font-style:italic;color:var(--chalk-gray);">"${escapeHtml(log.story)}"</div>` : ''}
                    </div>
                `).join('');
        }

        function renderDashboard() {
            const leaderboardHTML = crew.map(name => {
                const anglerLogs = logs.filter(l => l.angler === name);
                const count = anglerLogs.length;
                const weight = anglerLogs.reduce((sum, l) => sum + (l.weight || 0), 0);
                return {name, count, weight};
            }).sort((a, b) => b.weight - a.weight)
            .map((entry, idx) => `
                <div class="lb-entry">
                    <div style="display:flex;align-items:center;gap:1rem;">
                        <div class="lb-rank">${idx + 1}</div>
                        <div>${escapeHtml(entry.name)}</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="color:var(--chalk-gray);font-size:0.85rem;">${entry.count} fish</div>
                        <div class="log-weight">${entry.weight.toFixed(1)} lbs</div>
                    </div>
                </div>
            `).join('');
            document.getElementById('leaderboard').innerHTML = leaderboardHTML;

            const ctx = document.getElementById('stats-chart');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: crew,
                    datasets: [{
                        label: 'Fish Caught',
                        data: crew.map(name => logs.filter(l => l.angler === name).length),
                        backgroundColor: '#BA0C2F',
                        borderColor: 'rgba(245,245,245,0.12)',
                        borderWidth: 1,
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#252628',
                            titleColor: '#F5F5F5',
                            bodyColor: '#A2AAAD',
                            borderColor: 'rgba(162,170,173,0.2)',
                            borderWidth: 1
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#A2AAAD', font: { family: 'Inter' } },
                            grid:  { color: 'rgba(162,170,173,0.07)' }
                        },
                        y: {
                            ticks: { color: '#A2AAAD', font: { family: 'Inter' } },
                            grid:  { color: 'rgba(162,170,173,0.07)' }
                        }
                    }
                }
            });
        }

        function addStory() {
            const text = prompt("Share a story, Edse memory, or trip reflection:");
            if (text && text.trim()) {
                stories.unshift({id: Date.now(), text: text.trim(), timestamp: new Date().toLocaleDateString()});
                saveData();
                renderStories();
            }
        }

        function renderStories() {
            const container = document.getElementById('stories-list');
            container.innerHTML = stories.length === 0
                ? '<p style="color:var(--chalk-gray);text-align:center;padding:2rem 0;">No stories yet. Add some Prof. Edse blackboard classics!</p>'
                : stories.map(s => `
                    <div class="story-entry">
                        <div style="font-size:0.72rem;color:var(--chalk-gray);letter-spacing:0.05em;text-transform:uppercase;">${escapeHtml(s.timestamp)}</div>
                        <p style="margin-top:0.5rem;line-height:1.65;">${escapeHtml(s.text)}</p>
                    </div>
                `).join('');
        }

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById(`tab-content-${n}`).style.display = 'block';

            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === n);
            });

            if (n === 1) renderLogs();
            if (n === 2) renderDashboard();
            if (n === 3) renderStories();
        }

        function exportData() {
            const data = {crew, logs, stories, date: new Date().toISOString()};
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `beaver-telemetry-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        if (Array.isArray(imported.logs)) {
                            const existingLogIds = logs.map(item => Number(item?.id)).filter(Number.isFinite);
                            const usedLogIds = new Set(existingLogIds);
                            let nextLogId = Math.max(0, ...existingLogIds) + 1;
                            const sanitizedLogs = imported.logs
                                .filter(item => item && typeof item === 'object')
                                .map(item => {
                                    let id = Number(item.id);
                                    if (!Number.isFinite(id) || id < 0 || usedLogIds.has(id)) {
                                        id = nextLogId++;
                                    }
                                    usedLogIds.add(id);
                                    return {
                                        id,
                                        timestamp: String(item.timestamp || ''),
                                        angler: String(item.angler || ''),
                                        location: String(item.location || ''),
                                        species: String(item.species || ''),
                                        weight: Number(item.weight) || 0,
                                        length: Number(item.length) || 0,
                                        notes: String(item.notes || ''),
                                        story: String(item.story || '')
                                    };
                                });
                            logs = logs.concat(sanitizedLogs);
                        }
                        if (Array.isArray(imported.stories)) {
                            const existingStoryIds = stories.map(item => Number(item?.id)).filter(Number.isFinite);
                            const usedStoryIds = new Set(existingStoryIds);
                            let nextStoryId = Math.max(0, ...existingStoryIds) + 1;
                            const sanitizedStories = imported.stories
                                .filter(item => item && typeof item === 'object')
                                .map(item => {
                                    let id = Number(item.id);
                                    if (!Number.isFinite(id) || id < 0 || usedStoryIds.has(id)) {
                                        id = nextStoryId++;
                                    }
                                    usedStoryIds.add(id);
                                    return {
                                        id,
                                        text: String(item.text || ''),
                                        timestamp: String(item.timestamp || '')
                                    };
                                });
                            stories = stories.concat(sanitizedStories);
                        }
                        if (Array.isArray(imported.crew)) {
                            const importedCrew = imported.crew
                                .map(name => String(name).trim())
                                .filter(Boolean)
                                .slice(0, MAX_CREW_SIZE);
                            if (importedCrew.length > 0) crew = importedCrew;
                        }
                        saveData();
                        renderCrew();
                        alert('✅ Data imported!');
                        switchTab(1);
                    } catch(err) {
                        alert('Invalid file');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function clearAllData() {
            if (confirm('Reset everything?')) {
                localStorage.removeItem('beaverCrew');
                localStorage.removeItem('beaverLogs');
                localStorage.removeItem('beaverStories');
                logs = [];
                stories = [];
                crew = ["Tim", "Buddy 1", "Buddy 2", "Buddy 3"];
                renderCrew();
                switchTab(0);
            }
        }

        // Initialize
        window.onload = () => {
            loadData();
            renderCrew();
            switchTab(0);
            console.log('%cDr. Edse Mission Log ready — ΔS ≥ 0', 'color:#BA0C2F;font-weight:bold;font-size:14px');
        };
    </script>
</body>
</html>
